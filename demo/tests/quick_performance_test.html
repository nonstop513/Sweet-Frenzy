<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 快速性能测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 700px;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0,0,0,0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        #result {
            margin-top: 30px;
        }
        
        .result-card {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 12px;
            border-left: 5px solid #667eea;
            margin-bottom: 20px;
        }
        
        .metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #dee2e6;
        }
        
        .metric:last-child {
            border-bottom: none;
        }
        
        .metric-label {
            font-weight: 600;
            color: #555;
            font-size: 1.1em;
        }
        
        .metric-value {
            font-weight: 700;
            color: #667eea;
            font-size: 1.4em;
        }
        
        .metric-value.fast {
            color: #4caf50;
        }
        
        .metric-value.slow {
            color: #f44336;
        }
        
        .alert {
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 5px solid;
            font-size: 1.05em;
        }
        
        .alert-success {
            background: #e8f5e9;
            color: #2e7d32;
            border-color: #4caf50;
        }
        
        .alert-info {
            background: #e3f2fd;
            color: #1565c0;
            border-color: #2196F3;
        }
        
        .alert-warning {
            background: #fff3e0;
            color: #e65100;
            border-color: #ff9800;
        }
        
        .loading {
            text-align: center;
            color: #666;
            font-size: 1.1em;
            padding: 20px;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        
        .comparison-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .comparison-item h4 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 0.9em;
        }
        
        .comparison-item .value {
            font-size: 2em;
            font-weight: 700;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 快速性能测试</h1>
        <p class="subtitle">验证 index.html 的游戏引擎性能</p>
        
        <button onclick="testPerformance()">🚀 开始测试</button>
        
        <div id="result"></div>
    </div>
    
    <script src="../data.js"></script>
    <script src="../engine.js"></script>
    
    <script>
        // 创建引擎实例
        let engine = null;
        
        function initEngine() {
            if (typeof GameEngine === 'undefined') {
                return false;
            }
            if (typeof data === 'undefined') {
                return false;
            }
            engine = new GameEngine(data);
            return true;
        }
        
        function testPerformance() {
            const resultDiv = document.getElementById('result');
            
            // 显示加载状态
            resultDiv.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    正在测试性能...
                </div>
            `;
            
            // 延迟执行测试，确保 UI 更新
            setTimeout(() => {
                try {
                    // 初始化引擎
                    if (!engine && !initEngine()) {
                        resultDiv.innerHTML = `
                            <div class="alert alert-warning">
                                <strong>⚠️ 错误：</strong>无法加载游戏引擎或数据文件！<br>
                                请确认 data.js 和 engine.js 已正确加载。
                            </div>
                        `;
                        return;
                    }
                    
                    // 执行多次测试
                    const testCount = 10;
                    const results = [];
                    
                    for (let i = 0; i < testCount; i++) {
                        const start = performance.now();
                        const script = engine.generateFreeGameScript(10, 0);
                        const duration = performance.now() - start;
                        
                        results.push({
                            duration: duration,
                            score: script.totalScore,
                            spins: script.spins.length,
                            groups: script.spins.reduce((sum, s) => sum + (s.allConnectedGroups?.length || 0), 0)
                        });
                    }
                    
                    // 计算统计数据
                    const avgDuration = results.reduce((sum, r) => sum + r.duration, 0) / results.length;
                    const minDuration = Math.min(...results.map(r => r.duration));
                    const maxDuration = Math.max(...results.map(r => r.duration));
                    const avgScore = Math.round(results.reduce((sum, r) => sum + r.score, 0) / results.length);
                    const avgGroups = Math.round(results.reduce((sum, r) => sum + r.groups, 0) / results.length);
                    
                    // 判断性能等级
                    let performanceLevel = '';
                    let performanceClass = '';
                    let speedClass = '';
                    
                    if (avgDuration < 10) {
                        performanceLevel = '🎉 性能优秀！';
                        performanceClass = 'alert-success';
                        speedClass = 'fast';
                    } else if (avgDuration < 50) {
                        performanceLevel = '✅ 性能良好';
                        performanceClass = 'alert-success';
                        speedClass = 'fast';
                    } else if (avgDuration < 200) {
                        performanceLevel = '⚠️ 性能一般';
                        performanceClass = 'alert-warning';
                        speedClass = '';
                    } else {
                        performanceLevel = '❌ 性能较差';
                        performanceClass = 'alert-warning';
                        speedClass = 'slow';
                    }
                    
                    // 显示结果
                    resultDiv.innerHTML = `
                        <div class="result-card">
                            <h3 style="color: #667eea; margin-bottom: 20px; text-align: center;">
                                📊 测试结果（${testCount} 次测试）
                            </h3>
                            
                            <div class="metric">
                                <span class="metric-label">⏱️ 平均生成时间</span>
                                <span class="metric-value ${speedClass}">${avgDuration.toFixed(2)} ms</span>
                            </div>
                            
                            <div class="metric">
                                <span class="metric-label">⚡ 最快时间</span>
                                <span class="metric-value fast">${minDuration.toFixed(2)} ms</span>
                            </div>
                            
                            <div class="metric">
                                <span class="metric-label">🐢 最慢时间</span>
                                <span class="metric-value">${maxDuration.toFixed(2)} ms</span>
                            </div>
                            
                            <div class="metric">
                                <span class="metric-label">📊 平均分数</span>
                                <span class="metric-value">${avgScore.toLocaleString()}</span>
                            </div>
                            
                            <div class="metric">
                                <span class="metric-label">💎 平均连线数</span>
                                <span class="metric-value">${avgGroups}</span>
                            </div>
                        </div>
                        
                        <div class="alert ${performanceClass}">
                            <strong>${performanceLevel}</strong><br>
                            ${avgDuration < 10 ? '和性能测试工具一样快！引擎已高度优化 🚀' : 
                              avgDuration < 50 ? '性能表现良好，符合预期 👍' :
                              '可能有优化空间，建议检查配置'}
                        </div>
                        
                        <div class="comparison">
                            <div class="comparison-item">
                                <h4>测试工具平均</h4>
                                <div class="value">6.10 ms</div>
                            </div>
                            <div class="comparison-item">
                                <h4>本次测试平均</h4>
                                <div class="value ${speedClass}">${avgDuration.toFixed(2)} ms</div>
                            </div>
                        </div>
                        
                        <div class="alert alert-info" style="margin-top: 20px;">
                            <strong>💡 提示：</strong><br>
                            • 核心生成速度：${avgDuration.toFixed(2)} ms（仅脚本生成）<br>
                            • 用户感知慢：主要是 UI 渲染和动画延迟<br>
                            • 引擎本身已高度优化，BFS 性能优秀<br>
                            ${avgDuration < 10 ? '• 🎉 已达到最优性能！' : ''}
                        </div>
                    `;
                    
                } catch (error) {
                    resultDiv.innerHTML = `
                        <div class="alert alert-warning">
                            <strong>❌ 测试失败：</strong><br>
                            ${error.message}<br><br>
                            <strong>💡 可能的原因：</strong><br>
                            • data.js 或 engine.js 未正确加载<br>
                            • 浏览器兼容性问题<br>
                            • 文件路径错误
                        </div>
                    `;
                    console.error('测试错误:', error);
                }
            }, 100);
        }
        
        // 页面加载完成后初始化
        window.addEventListener('load', () => {
            initEngine();
        });
    </script>
</body>
</html>
