    <script>
        function log(containerId, message, type = 'info') {
            const container = document.getElementById(containerId);
            const entry = document.createElement('div');

            entry.textContent = message;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;

        // 1. жЈҖ?Ҙж–№жі•жҳҜ?Ұе???
        function checkMethods() {
            clearLog('methodCheck');
            
            log('methodCheck', '?? жЈҖ??GameEngine ??gameData...', 'info');
            
            if (typeof GameEngine === 'undefined') {
                log('methodCheck', '??GameEngine ?Әе?д№үп?engine.js ?Әе?иҪҪп?', 'error');
                return;
            }
            log('methodCheck', '??GameEngine е·Іе?д№?, 'success');
            
            if (typeof gameData === 'undefined') {
                log('methodCheck', '??gameData ?Әе?д№үп?data.js ?Әе?иҪҪп?', 'error');
                return;
            }
            log('methodCheck', '??gameData е·Іе?д№?, 'success');
            
            try {
                const engine = new GameEngine(gameData);
                log('methodCheck', '??GameEngine е®һд??ӣе»ә?җе?', 'success');
                
                // жЈҖ?Ҙж–№жі?
                const methods = [
                    'findConnectedGroup',
                    'findAllMatches',
                    '_generateSingleSpin',

                ];
                
                log('methodCheck', '\n?? жЈҖ?Ҙж–№жі•жҳҜ?Ұе??Ёп?', 'info');
                methods.forEach(method => {

        // 2. жөӢи? Hook ?ҜеҗҰе·Ҙд?
        function testHook() {
            clearLog('hookTest');
            
            log('hookTest', '?”§ жөӢи? Hook ?әеҲ¶...', 'info');
            
            try {
                const engine = new GameEngine(gameData);
                let callCount = 0;
                
                // Hook findConnectedGroup
                const originalFindConnectedGroup = engine.findConnectedGroup;
                log('hookTest', `?ҹе??№ж?зұ»е?: ${typeof originalFindConnectedGroup}`, 'info');
                
                if (typeof originalFindConnectedGroup !== 'function') {
                    log('hookTest', '??findConnectedGroup дёҚжҳҜ?Ҫж•°пј?, 'error');
                    return;
                }
                
                engine.findConnectedGroup = function(...args) {
                    callCount++;
                    log('hookTest', `  ?ҺҜ Hook ?ҰжҲӘ?°и??Ёп?callCount = ${callCount}`, 'success');
                    return originalFindConnectedGroup.apply(this, args);
                };
                
                log('hookTest', '??Hook е·Іи®ҫзҪ?, 'success');
                log('hookTest', '\n?§Ә жөӢи?и°ғз”Ё findConnectedGroup...', 'info');
                
                // ?ӣе»әжөӢи??ҳйқў

                    [2, 2, 2, 2, null],
                    [2, 2, 2, 2, 2, null],
                    [2, 2, 2, 0, 2, 2, 2],
                    [2, 2, 2, 2, 2, null],
                    [2, 2, 2, 2, null],
                    [2, 2, 2, null]
                ];
                
                const visited = Array(7).fill(null).map(() => Array(7).fill(false));
                
                // ?ҙжҺҘи°ғз”ЁжөӢи?
                const group = engine.findConnectedGroup(testBoard, 0, 0, visited);
                
                log('hookTest', `\n?? жөӢи?з»“ж?пјҡ`, 'info');
                log('hookTest', `  Hook и°ғз”Ёж¬Ўж•°: ${callCount}`, callCount > 0 ? 'success' : 'error');
                log('hookTest', `  иҝ”е??„и?зәҝж•°: ${group.length}`, 'info');
                
                if (callCount === 0) {
                    log('hookTest', '\n??Hook еӨұиҙҘпјҒеҸҜ?Ҫе?? п?', 'error');
                    log('hookTest', '  1. ?№ж?иў«з?еӯҳж?з»‘е?', 'warning');
                    log('hookTest', '  2. дҪҝз”ЁдәҶд??Ңз?еј•з”Ё', 'warning');
                    log('hookTest', '  3. д»??и·Ҝе?дёҚе?', 'warning');
                } else {
                    log('hookTest', '\n??Hook е·Ҙд?жӯ?ёёпј?, 'success');
                }
                
            } catch (error) {
                log('hookTest', `??жөӢи?еӨұиҙҘпј?{error.message}`, 'error');
                console.error(error);
            }
        }

                    const result = originalFindAllMatches.apply(this, args);

                    log('spinTest', '  2. findAllMatches ?Әиў«и°ғз”Ё', 'warning');
                    log('spinTest', '  3. д»???»и?и·іи?дәҶжҹҘ?ҫжӯҘйӘ?, 'warning');
                    
                    // жЈҖ?Ҙз???
                    log('spinTest', '\n?? жЈҖ?Ҙз??җз??ҳйқўпј?, 'info');
                    if (spin.board) {
                        let symbolCount = 0;
                        spin.board.forEach((row, r) => {

                    } else {

                // ?ҙж–°з»ҹи®Ў
                updateStats({ bfsCount, matchesCount, duration });
                
            } catch (error) {
                log('spinTest', `???ҹж?еӨұиҙҘпј?{error.message}`, 'error');
                console.error(error);
            }
        }
        
        // 4. е®Ңж•ҙ FreeGame жөӢи?
        function testFreeGame() {
            clearLog('freeGameTest');
            
            log('freeGameTest', '?Һ® ?ҹж? FreeGame (10 Spin)...', 'info');

                } else {

        // ?ҙж–°з»ҹи®Ў?ҫзӨә
