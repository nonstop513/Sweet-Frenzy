<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>?аж??йТђДУЃй?єТ?</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            font-size: 14px;
        }
        .section {

        .breakdown {

        }
        table {

            margin: 10px 0;
        }
        th, td {

        }

            height: 20px;

        }

            position: absolute;
            left: 10px;
            line-height: 20px;
            color: white;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>?? ?аж??йТђДУЃй?єТ?№╝ѕУ»ду╗єт?УД??</h1>
    
    <div class="section">
        <h3>?ЋСИфSpin?ЪТ? - т«їТЋ┤У«АТЌХ</h3>
        <button onclick="profileSingleSpin()">?єТ??ЋСИфSpin</button>
        <div id="singleSpinResult"></div>
    </div>
    
    <div class="section">
        <h3>FreeGame 10 Spin - у┤»У«Ау╗ЪУ«А</h3>
        <button onclick="profileFreeGame()">?єТ?т«їТЋ┤FreeGame</button>
        <div id="freeGameResult"></div>
    </div>

    <script src="../data.js"></script>
    <script src="../engine.js"></script>
    <script>
        function profileSingleSpin() {
            const result = document.getElementById('singleSpinResult');
            result.innerHTML = '<pre>???єТ?СИ?..</pre>';
            
            setTimeout(() => {
                const engine = new GameEngine(gameData);
                const timings = {};
                
                // ?Џт╗║У«АТЌХУБЁжЦ░??
                const timeFunction = (obj, fnName, label) => {
                    const original = obj[fnName].bind(obj);
                    obj[fnName] = function(...args) {
                        const start = performance.now();
                        const result = original(...args);
                        const duration = performance.now() - start;
                        timings[label] = (timings[label] || 0) + duration;
                        return result;
                    };
                };
                
                // ?ЁУ??│жћ«?йТЋ░
                timeFunction(engine, 'generateInitialBoard', 'initialBoard');
                timeFunction(engine, 'findAllMatches', 'findMatches');
                timeFunction(engine, 'calculateScore', 'calculateScore');
                timeFunction(engine, 'applyGravity', 'gravity');
                timeFunction(engine, 'fillDropSymbols', 'fillDrop');
                timeFunction(engine, 'cloneBoard', 'cloneBoard');
                timeFunction(engine, 'placeMegaSymbols', 'megaPlace');
                
                const totalStart = performance.now();
                const script = engine._generateSingleSpin(0, 0, true, 0);
                const totalTime = performance.now() - totalStart;
                
                // У«Ау??ХС??ХжЌ┤
                const measuredTime = Object.values(timings).reduce((a, b) => a + b, 0);
                timings['other'] = totalTime - measuredTime;
                
                let html = '<div class="breakdown">';
                html += `<pre>?▒№?  ?╗УђЌТЌХ: <span class="time">${Math.round(totalTime)}ms</span>\n`;
                html += `?? Cascade?? ${script.cascades.length}\n`;
                html += `?њ░ ?╗т?: ${script.totalScore}\n</pre>`;
                html += '</div>';
                
                html += '<table>';
                html += '<tr><th>?ЇС?</th><th>?ЌТЌХ</th><th>?аТ?</th><th>У░ЃућеТгАТЋ░</th><th>?ЋТгА</th></tr>';
                
                const items = [
                    { label: 'BFS?ЦТЅЙ?╣ж?', key: 'findMatches', calls: script.cascades.length },
                    { label: '?Ют??ўжЮб?ЪТ?', key: 'initialBoard', calls: 1 },
                    { label: 'тАФт?угдтЈи', key: 'fillDrop', calls: script.cascades.length },
                    { label: '?Їт?ТеАТ?', key: 'gravity', calls: script.cascades.length },
                    { label: '?░у??Іж?', key: 'cloneBoard', calls: script.cascades.length * 2 },
                    { label: '?єТЋ░У«Ау?', key: 'calculateScore', calls: 'N' },
                    { label: 'Mega?Йуй«', key: 'megaPlace', calls: 'N' },
                    { label: '?ХС??ЇС?', key: 'other', calls: '-' }
                ];
                
                items.forEach(item => {
                    const time = timings[item.key] || 0;
                    const percent = (time / totalTime * 100).toFixed(1);
                    const avgTime = item.calls > 0 ? (time / item.calls).toFixed(1) : '-';
                    
                    if (time > 0) {
                        html += `<tr>`;
                        html += `<td>${item.label}</td>`;
                        html += `<td class="time">${Math.round(time)}ms</td>`;
                        html += `<td>${percent}%</td>`;
                        html += `<td>${item.calls}</td>`;
                        html += `<td>${avgTime}ms</td>`;
                        html += `</tr>`;
                    }
                });
                
                html += '</table>';
                
                // ?»У???
                html += '<h4>?ХжЌ┤?єт??»У??ќ№?</h4>';
                const sortedItems = items
                    .map(item => ({ ...item, time: timings[item.key] || 0 }))
                    .filter(item => item.time > 0)
                    .sort((a, b) => b.time - a.time);
                
                sortedItems.forEach(item => {
                    const width = (item.time / totalTime * 100).toFixed(1);
                    html += `<div class="bar" style="width: ${width}%">`;
                    html += `<span class="bar-label">${item.label}: ${Math.round(item.time)}ms (${width}%)</span>`;
                    html += '</div>';
                });
                
                result.innerHTML = html;
            }, 100);
        }
        
        function profileFreeGame() {
            const result = document.getElementById('freeGameResult');
            result.innerHTML = '<pre>???єТ?СИ?..</pre>';
            
            setTimeout(() => {
                const engine = new GameEngine(gameData);
                const timings = {};
                let totalCalls = {};
                
                // ?Џт╗║У«АТЌХУБЁжЦ░??
                const timeFunction = (obj, fnName, label) => {
                    const original = obj[fnName].bind(obj);
                    obj[fnName] = function(...args) {
                        const start = performance.now();
                        const result = original(...args);
                        const duration = performance.now() - start;
                        timings[label] = (timings[label] || 0) + duration;
                        totalCalls[label] = (totalCalls[label] || 0) + 1;
                        return result;
                    };
                };
                
                // ?ЁУ??│жћ«?йТЋ░
                timeFunction(engine, 'generateInitialBoard', 'initialBoard');
                timeFunction(engine, 'findAllMatches', 'findMatches');
                timeFunction(engine, 'findConnectedGroup', 'bfsSearch');
                timeFunction(engine, 'calculateScore', 'calculateScore');
                timeFunction(engine, 'applyGravity', 'gravity');
                timeFunction(engine, 'fillDropSymbols', 'fillDrop');
                timeFunction(engine, 'cloneBoard', 'cloneBoard');
                timeFunction(engine, 'convertMySymbols', 'convertMY');
                
                const totalStart = performance.now();
                const freeGame = engine.generateFreeGameScript(10, 0);
                const totalTime = performance.now() - totalStart;
                
                // у╗ЪУ«А
                let totalCascades = 0;
                let totalMatches = 0;
                freeGame.spins.forEach(spin => {
                    totalCascades += spin.cascades.length;
                    spin.cascades.forEach(cascade => {
                        totalMatches += cascade.matches?.length || 0;
                    });
                });
                
                let html = '<div class="breakdown">';
                html += `<pre>?▒№?  ?╗УђЌТЌХ: <span class="time">${Math.round(totalTime)}ms</span>\n`;
                html += `?? у╗ЪУ«А:\n`;
                html += `  - ?╗Spin?? ${freeGame.spins.length}\n`;
                html += `  - ?╗Cascade?? ${totalCascades}\n`;
                html += `  - ?╗тї╣?Їу??? ${totalMatches}\n`;
                html += `  - т╣│т?Т»ЈSpin: ${Math.round(totalTime / freeGame.spins.length)}ms\n`;
                html += `  - т╣│т?Т»ЈCascade: ${Math.round(totalTime / totalCascades)}ms\n</pre>`;
                html += '</div>';
                
                html += '<table>';
                html += '<tr><th>?ЇС?</th><th>у┤»У«А?ЌТЌХ</th><th>?аТ?</th><th>У░ЃућеТгАТЋ░</th><th>т╣│т?</th></tr>';
                
                const sortedTimings = Object.entries(timings)
                    .sort((a, b) => b[1] - a[1]);
                
                const labels = {
                    'findMatches': 'BFS?ЦТЅЙ?╣ж?',
                    'bfsSearch': 'BFSУ┐ъжђџу??ЦТЅЙ',
                    'fillDrop': 'тАФт?угдтЈи',
                    'gravity': '?Їт?ТеАТ?',
                    'cloneBoard': '?░у??Іж?',
                    'initialBoard': '?Ют??ўжЮб?ЪТ?',
                    'calculateScore': '?єТЋ░У«Ау?',
                    'convertMY': 'MYугдтЈиУйгТЇб'
                };
                
                sortedTimings.forEach(([key, time]) => {
                    const percent = (time / totalTime * 100).toFixed(1);
                    const calls = totalCalls[key] || 0;
                    const avg = calls > 0 ? (time / calls).toFixed(2) : '-';
                    
                    html += `<tr>`;
                    html += `<td>${labels[key] || key}</td>`;
                    html += `<td class="time">${Math.round(time)}ms</td>`;
                    html += `<td>${percent}%</td>`;
                    html += `<td>${calls}</td>`;
                    html += `<td>${avg}ms</td>`;
                    html += `</tr>`;
                });
                
                html += '</table>';
                
                // ?»У???
                html += '<h4>?ХжЌ┤?єт?№╝ѕTop 5№╝Ѕ№?</h4>';
                sortedTimings.slice(0, 5).forEach(([key, time]) => {
                    const width = (time / totalTime * 100).toFixed(1);
                    html += `<div class="bar" style="width: ${width}%">`;
                    html += `<span class="bar-label">${labels[key] || key}: ${Math.round(time)}ms (${width}%)</span>`;
                    html += '</div>';
                });
                
                // ?ДУЃйт╗║У««
                html += '<div class="breakdown">';
                html += '<h4>?њА ?ДУЃй?Хж??єТ?№╝?/h4><pre>';
                
                const bfsTime = (timings['findMatches'] || 0) + (timings['bfsSearch'] || 0);
                const bfsPercent = (bfsTime / totalTime * 100).toFixed(1);
                
                if (bfsPercent > 30) {
                    html += `?ћЦ BFS?ЦТЅЙ?аТ?${bfsPercent}% - СИ╗У??Хж?\n`;
                    html += `   ти▓С??? Сй┐ућеу┤бт?С╗?Џ┐shift() ?Њ\n`;
                    html += `   ти▓С??? тцЇућеvisited?░у? ?Њ\n`;
                }
                
                const clonePercent = ((timings['cloneBoard'] || 0) / totalTime * 100).toFixed(1);
                if (clonePercent > 15) {
                    html += `\n?? ?░у??Іж??аТ?${clonePercent}%\n`;
                    html += `   ти▓С??? ?ДУЃйТеАт??Јт?т┐ФуЁД ?Њ\n`;
                }
                
                html += `\n??тйЊт??ДУЃйти▓С??ќ№?${Math.round(totalTime / freeGame.spins.length)}ms/spin?»т??єТ░┤т╣│`;
                html += '</pre></div>';
                
                result.innerHTML = html;
            }, 100);
        }
        
        // ?фтіеУ┐љУ?
        window.onload = () => profileSingleSpin();
    </script>
</body>
</html>
